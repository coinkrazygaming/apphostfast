# Production-like configuration for VPS deployment
# Combine with docker-compose.yml using:
# docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: '3.8'

services:
  web:
    restart: always
    environment:
      NODE_ENV: production
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`apphostfast.dev`)"
      - "traefik.http.routers.web.entrypoints=web,websecure"
      - "traefik.http.routers.web.tls=true"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
    command: pnpm start

  db:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}

  redis:
    restart: always

  traefik:
    restart: always

networks:
  default:
    driver: bridge
