services:
  - type: web
    name: apphostfast
    runtime: node
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: apphostfast-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: apphostfast-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
    healthCheckPath: /api/health
    region: oregon
    plan: starter
    numInstances: 1
    disk:
      name: app-data
      mountPath: /app
      sizeGB: 10

  - type: postgres
    name: apphostfast-db
    region: oregon
    plan: starter
    version: "16"
    databaseName: apphostfast
    envVars:
      - key: DATABASE_URL
        value: postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}

  - type: redis
    name: apphostfast-redis
    region: oregon
    plan: starter
    version: "7"
